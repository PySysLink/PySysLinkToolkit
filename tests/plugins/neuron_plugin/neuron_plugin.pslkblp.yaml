pluginName: neuron_plugin
pluginType: highLevelBlockLibrary
blockType: high_level
metadata:
  pythonFilename: neuron_plugin.py
blockLibraries:
  - name: neuron_library
    blockTypes:
      - name: neuron
        configurationValues:
          - name: Gains
            defaultValue:
            - 1
            - 1
            type: float[]
        inputPortNumber: len(Gains) + 1
        outputPortNumber: 1